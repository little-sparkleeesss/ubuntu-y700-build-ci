name: Build RootFS And GRUB

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create/upload. Empty disables release upload.
        required: false
        type: string
      output_prefix:
        description: Output artifact prefix
        required: true
        default: y700-kubuntu2604-arm64
        type: string
      rootfs_config:
        description: Rootfs config as KEY=value lines
        required: true
        type: string
        default: |
          DISTRO=resolute
          ARCH=arm64
          MIRROR=http://ports.ubuntu.com/ubuntu-ports
          DEBOOTSTRAP_VARIANT=
          ROOTFS_IMAGE_SIZE=20G
          ROOTFS_UUID=
          ROOTFS_LABEL=Y700UBUNTU
          ROOTFS_PARTLABEL=userdata
          HOSTNAME_NAME=y700
          DEFAULT_USER_NAME=y700
          DEFAULT_USER_PASSWORD=1234
          ROOT_PASSWORD_MODE=locked
          ROOT_PASSWORD=
          USER_SUDO_MODE=password
          TZ_REGION=Asia/Shanghai
          LANG_NAME=zh_CN.UTF-8
          PACKAGE_LIST=
          DESKTOP_ENV=kubuntu-desktop
          OVERLAY_ARCHIVE=
          DEB_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-device-debs-20260624-201420-compat1.tar.gz
          BUILD_Y700_SENSOR_DEBS=1
          SENSOR_SOURCE_ARCHIVE=
          SENSOR_BASELINE_OVERLAY_ARCHIVE=
          SENSOR_DEB_VERSION=20260626.1
          SENSOR_STRIP=1
          BUILD_TB321FU_HAPTICS_DEB=1
          HAPTICS_SOURCE_ARCHIVE=
          KERNEL_SOURCE_ARCHIVE=
          KERNEL_BUILD_ARCHIVE=
          HAPTICS_DEB_VERSION=20260627.1
          HAPTICS_STRIP=1
          BUILD_TB321FU_GPU_SENSOR=1
          TB321FU_GPU_SENSOR_SOURCE_DIR=
          TB321FU_GPU_SENSOR_BUILD_JOBS=2
          APPLY_Y700_FIRMWARE_FIXES=1
          APPLY_Y700_AUDIO_POLICY_FIXES=1
          CLEAN_APT_CACHE=1
          COMPRESS=7z
          CHUNK_SIZE=1500m
          KEEP_RAW_IMAGE=0
      boot_config:
        description: GRUB/FAT boot image config as KEY=value lines
        required: true
        type: string
        default: |
          BOOT_TEMPLATE_IMAGE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-verified-grub-template-userdata-20260624-201420.img
          BOOT_IMAGE_SIZE=256M
          BOOT_FAT_BITS=32
          BOOT_FAT_LABEL=Y700GRUB
          BOOT_SECTOR_SIZE=512
          BOOT_CLUSTER_SECTORS=
          ROOT_SELECTOR=partlabel
          ROOT_PARTLABEL=userdata
          ROOT_UUID=
          ROOTARGS=
          ROOTARGS_EXTRA=
          STABLEARGS=drm_client_lib.active=none
          BOOT_COMPRESS=7z
          BOOT_CHUNK_SIZE=1500m
          KEEP_BOOT_IMAGE=0
      source_config:
        description: Input artifact URLs as KEY=value lines
        required: true
        type: string
        default: |
          KERNEL_ARTIFACT_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-kernel-artifacts-7.1.1-g5df8e852ea72.tar.gz
          BOOTAA64_EFI_URL=
          QCOMRAMP_EFI_URL=
          QCOMRAMP_CFG_NAME=qcomramp.cfg
          GRUB_BUILD_ARCHIVE=
          DTB_NAME=sm8650-lenovo-tb321fu.dtb

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap dosfstools mtools e2fsprogs rsync curl unzip tar xz-utils zstd p7zip-full \
            gdisk qemu-utils sudo ca-certificates gnupg \
            meson ninja-build pkg-config protobuf-c-compiler gcc-aarch64-linux-gnu \
            libglib2.0-dev:arm64 libqmi-glib-dev:arm64 libgudev-1.0-dev:arm64 libpolkit-gobject-1-dev:arm64 libprotobuf-c-dev:arm64

      - name: Apply workflow configuration
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/rootfs.env" <<'CONFIG_EOF'
          ${{ inputs.rootfs_config }}
          CONFIG_EOF
          cat > "$RUNNER_TEMP/boot.env" <<'CONFIG_EOF'
          ${{ inputs.boot_config }}
          CONFIG_EOF
          cat > "$RUNNER_TEMP/source.env" <<'CONFIG_EOF'
          ${{ inputs.source_config }}
          CONFIG_EOF
          sed -i 's/^          //' "$RUNNER_TEMP/rootfs.env" "$RUNNER_TEMP/boot.env" "$RUNNER_TEMP/source.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/rootfs.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/boot.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/source.env"
          {
            echo 'OUTPUT_DIR_ROOTFS=out/ci-rootfs'
            echo 'OUTPUT_DIR_GRUB=out/ci-grub'
            echo 'OUTPUT_PREFIX<<EOF_OUTPUT_PREFIX'
            echo '${{ inputs.output_prefix }}'
            echo 'EOF_OUTPUT_PREFIX'
          } >> "$GITHUB_ENV"

      - name: Prepare GRUB build input
        run: |
          set -euo pipefail
          if [ -n "${GRUB_BUILD_ARCHIVE:-}" ]; then
            mkdir -p "$RUNNER_TEMP/grub-build"
            curl -fL --retry 3 -o "$RUNNER_TEMP/grub-build.tar" "$GRUB_BUILD_ARCHIVE"
            if ! tar -C "$RUNNER_TEMP/grub-build" -xf "$RUNNER_TEMP/grub-build.tar"; then
              tar -C "$RUNNER_TEMP/grub-build" -xzf "$RUNNER_TEMP/grub-build.tar"
            fi
            found=$(find "$RUNNER_TEMP/grub-build" -type f -name grub-mkstandalone -perm -111 | head -n1)
            test -n "$found"
            echo "Y700_GRUB_BUILD_DIR=$(dirname "$found")" >> "$GITHUB_ENV"
          elif [ -n "${QCOMRAMP_EFI_URL:-}" ]; then
            echo 'Y700_GRUB_BUILD_DIR=' >> "$GITHUB_ENV"
            echo 'Using prebuilt QCOMRAMP_EFI_URL; skipping grub-mkstandalone input.'
          elif [ -n "${BOOT_TEMPLATE_IMAGE:-}" ] || [ -n "${BOOT_TEMPLATE_IMAGE_URL:-}" ]; then
            echo 'Y700_GRUB_BUILD_DIR=' >> "$GITHUB_ENV"
            echo 'Using BOOT_TEMPLATE_IMAGE; preserving verified GRUB/EFI template.'
          else
            echo 'Either GRUB_BUILD_ARCHIVE, QCOMRAMP_EFI_URL, or BOOT_TEMPLATE_IMAGE must be set.' >&2
            exit 1
          fi

      - name: Build source sensor debs
        run: |
          set -euo pipefail
          if [ "${BUILD_Y700_SENSOR_DEBS:-0}" != "1" ]; then
            echo 'BUILD_Y700_SENSOR_DEBS is not 1; skipping.'
            echo 'Y700_SENSOR_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${SENSOR_SOURCE_ARCHIVE:-}" ] && [ -z "${SENSOR_SOURCE_DIR:-}" ]; then
            echo 'No SENSOR_SOURCE_ARCHIVE/SENSOR_SOURCE_DIR provided; skipping source sensor deb build.'
            echo 'Y700_SENSOR_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${SENSOR_BASELINE_OVERLAY_ARCHIVE:-}" ] && [ -z "${SENSOR_BASELINE_OVERLAY_DIR:-}" ]; then
            echo 'No SENSOR_BASELINE_OVERLAY_ARCHIVE/SENSOR_BASELINE_OVERLAY_DIR provided; skipping source sensor deb build.'
            echo 'Y700_SENSOR_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          env OUTPUT_DIR="out/y700-sensor-debs" \
            ARCH="${ARCH:-arm64}" \
            SENSOR_DEB_VERSION="${SENSOR_DEB_VERSION:-20260626.1}" \
            SENSOR_SOURCE_ARCHIVE="${SENSOR_SOURCE_ARCHIVE:-}" \
            SENSOR_SOURCE_DIR="${SENSOR_SOURCE_DIR:-}" \
            SENSOR_BASELINE_OVERLAY_ARCHIVE="${SENSOR_BASELINE_OVERLAY_ARCHIVE:-}" \
            SENSOR_BASELINE_OVERLAY_DIR="${SENSOR_BASELINE_OVERLAY_DIR:-}" \
            SENSOR_STRIP="${SENSOR_STRIP:-1}" \
            bash scripts/ci/build-y700-sensor-debs.sh
          echo 'Y700_SENSOR_DEB_DIR=out/y700-sensor-debs' >> "$GITHUB_ENV"

      - name: Build source haptics deb
        run: |
          set -euo pipefail
          if [ "${BUILD_TB321FU_HAPTICS_DEB:-0}" != "1" ]; then
            echo 'BUILD_TB321FU_HAPTICS_DEB is not 1; skipping.'
            echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${HAPTICS_SOURCE_ARCHIVE:-}" ] && [ -z "${HAPTICS_SOURCE_DIR:-}" ]; then
            echo 'No HAPTICS_SOURCE_ARCHIVE/HAPTICS_SOURCE_DIR provided; skipping haptics deb build.'
            echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${KERNEL_SOURCE_ARCHIVE:-}" ] && [ -z "${KERNEL_SOURCE_DIR:-}" ]; then
            echo 'No KERNEL_SOURCE_ARCHIVE/KERNEL_SOURCE_DIR provided; skipping haptics deb build.'
            echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${KERNEL_BUILD_ARCHIVE:-}" ] && [ -z "${KERNEL_BUILD_DIR:-}" ]; then
            echo 'No KERNEL_BUILD_ARCHIVE/KERNEL_BUILD_DIR provided; skipping haptics deb build.'
            echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          env OUTPUT_DIR="out/tb321fu-haptics-debs" \
            ARCH="${ARCH:-arm64}" \
            HAPTICS_DEB_VERSION="${HAPTICS_DEB_VERSION:-20260627.1}" \
            HAPTICS_SOURCE_ARCHIVE="${HAPTICS_SOURCE_ARCHIVE:-}" \
            HAPTICS_SOURCE_DIR="${HAPTICS_SOURCE_DIR:-}" \
            KERNEL_SOURCE_ARCHIVE="${KERNEL_SOURCE_ARCHIVE:-}" \
            KERNEL_SOURCE_DIR="${KERNEL_SOURCE_DIR:-}" \
            KERNEL_BUILD_ARCHIVE="${KERNEL_BUILD_ARCHIVE:-}" \
            KERNEL_BUILD_DIR="${KERNEL_BUILD_DIR:-}" \
            HAPTICS_STRIP="${HAPTICS_STRIP:-1}" \
            bash scripts/ci/build-tb321fu-haptics-deb.sh
          echo 'TB321FU_HAPTICS_DEB_DIR=out/tb321fu-haptics-debs' >> "$GITHUB_ENV"

      - name: Build rootfs image
        run: |
          set -euo pipefail
          sudo --preserve-env=OUTPUT_PREFIX,DISTRO,ARCH,MIRROR,DEBOOTSTRAP_VARIANT,RESOLV_CONF_CONTENT,APT_HTTP_PROXY,APT_HTTPS_PROXY,http_proxy,https_proxy,HTTP_PROXY,HTTPS_PROXY,APT_SOURCES_LIST,ROOTFS_IMAGE_SIZE,ROOTFS_UUID,ROOTFS_LABEL,ROOTFS_PARTLABEL,HOSTNAME_NAME,DEFAULT_USER_NAME,DEFAULT_USER_PASSWORD,ROOT_PASSWORD_MODE,ROOT_PASSWORD,USER_SUDO_MODE,TZ_REGION,LOCALES,LANG_NAME,PACKAGE_LIST,DESKTOP_ENV,OVERLAY_ARCHIVE,DEB_ARCHIVE,DEB_DIR,SENSOR_DEB_DIR,HAPTICS_DEB_DIR,BUILD_TB321FU_GPU_SENSOR,TB321FU_GPU_SENSOR_SOURCE_DIR,TB321FU_GPU_SENSOR_BUILD_JOBS,APPLY_Y700_FIRMWARE_FIXES,APPLY_Y700_AUDIO_POLICY_FIXES,CLEAN_APT_CACHE,COMPRESS,CHUNK_SIZE,KEEP_RAW_IMAGE \
            env OUTPUT_DIR="$OUTPUT_DIR_ROOTFS" SENSOR_DEB_DIR="${Y700_SENSOR_DEB_DIR:-}" HAPTICS_DEB_DIR="${TB321FU_HAPTICS_DEB_DIR:-}" bash scripts/ci/build-rootfs-image.sh
          sudo chown -R "$USER:$USER" out

      - name: Build GRUB boot image
        run: |
          set -euo pipefail
          env OUTPUT_DIR="$OUTPUT_DIR_GRUB" \
            OUTPUT_PREFIX="$OUTPUT_PREFIX" \
            BOOT_TEMPLATE_IMAGE="${BOOT_TEMPLATE_IMAGE:-}" \
            BOOT_TEMPLATE_IMAGE_URL="${BOOT_TEMPLATE_IMAGE_URL:-}" \
            BOOT_IMAGE_SIZE="$BOOT_IMAGE_SIZE" \
            BOOT_FAT_BITS="$BOOT_FAT_BITS" \
            BOOT_FAT_LABEL="$BOOT_FAT_LABEL" \
            BOOT_SECTOR_SIZE="$BOOT_SECTOR_SIZE" \
            BOOT_CLUSTER_SECTORS="$BOOT_CLUSTER_SECTORS" \
            KERNEL_ARTIFACT_ARCHIVE="$KERNEL_ARTIFACT_ARCHIVE" \
            BOOTAA64_EFI_URL="$BOOTAA64_EFI_URL" \
            QCOMRAMP_EFI_URL="$QCOMRAMP_EFI_URL" \
            QCOMRAMP_CFG_NAME="$QCOMRAMP_CFG_NAME" \
            DTB_NAME="$DTB_NAME" \
            ROOT_SELECTOR="$ROOT_SELECTOR" \
            ROOT_PARTLABEL="$ROOT_PARTLABEL" \
            ROOT_UUID="$ROOT_UUID" \
            ROOTARGS="$ROOTARGS" \
            ROOTARGS_EXTRA="$ROOTARGS_EXTRA" \
            STABLEARGS="$STABLEARGS" \
            BOOT_COMPRESS="$BOOT_COMPRESS" \
            BOOT_CHUNK_SIZE="$BOOT_CHUNK_SIZE" \
            KEEP_BOOT_IMAGE="$KEEP_BOOT_IMAGE" \
            Y700_GRUB_BUILD_DIR="$Y700_GRUB_BUILD_DIR" \
            bash scripts/ci/build-grub-image.sh

      - name: Write combined checksums
        run: |
          set -euo pipefail
          mkdir -p out/ci-release
          checksum_dirs=("$OUTPUT_DIR_ROOTFS" "$OUTPUT_DIR_GRUB")
          if [ -d out/y700-sensor-debs ]; then
            checksum_dirs+=(out/y700-sensor-debs)
          fi
          if [ -d out/tb321fu-haptics-debs ]; then
            checksum_dirs+=(out/tb321fu-haptics-debs)
          fi
          find "${checksum_dirs[@]}" -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > out/ci-release/SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_prefix }}-rootfs-grub
          path: |
            out/ci-rootfs/*
            out/ci-grub/*
            out/y700-sensor-debs/*
            out/tb321fu-haptics-debs/*
            out/ci-release/SHA256SUMS.txt

      - name: Upload release assets
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --prerelease --title "$RELEASE_TAG"
          release_assets=(out/ci-rootfs/* out/ci-grub/* out/ci-release/SHA256SUMS.txt)
          if compgen -G 'out/y700-sensor-debs/*' >/dev/null; then
            release_assets+=(out/y700-sensor-debs/*)
          fi
          if compgen -G 'out/tb321fu-haptics-debs/*' >/dev/null; then
            release_assets+=(out/tb321fu-haptics-debs/*)
          fi
          gh release upload "$RELEASE_TAG" "${release_assets[@]}" --clobber
