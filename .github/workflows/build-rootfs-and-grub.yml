name: Build RootFS And GRUB

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 要创建或更新的 Release 标签；留空只生成 Actions artifact，不上传 Release。
        required: false
        type: string
      output_prefix:
        description: 输出文件名前缀；会用于 rootfs、grub 和 artifact 名称。
        required: true
        default: y700-kubuntu2604-arm64
        type: string
      ubuntu_mirror:
        description: Ubuntu 软件源地址；arm64 设备应使用 ports.ubuntu.com/ubuntu-ports。
        required: true
        default: http://ports.ubuntu.com/ubuntu-ports
        type: choice
        options:
          - http://ports.ubuntu.com/ubuntu-ports
      debootstrap_variant:
        description: debootstrap 变体；default 表示不传 --variant，minbase 是更小基础系统，buildd 偏构建环境。
        required: true
        default: default
        type: choice
        options:
          - default
          - minbase
          - buildd
      rootfs_image_size:
        description: rootfs ext4 镜像大小；可手填如 20G、24G、32768M，过小可能导致桌面环境安装失败。
        required: true
        default: 20G
        type: string
      rootfs_label:
        description: rootfs 文件系统卷标；只是 ext4 label，不决定刷入分区。
        required: true
        default: Ubuntu
        type: string
      rootfs_partlabel:
        description: rootfs GPT 分区标签；当前 Y700 启动和刷机默认应保持 userdata，但可手填其它标签。
        required: true
        default: userdata
        type: string
      hostname_name:
        description: 系统主机名；安装后会写入 /etc/hostname。
        required: true
        default: y700
        type: string
      default_user_name:
        description: 默认创建的普通用户名；也会被可选 SDDM 自动登录使用。
        required: true
        default: y700
        type: string
      default_user_password:
        description: 默认用户密码；注意 GitHub workflow 输入本身不是保密字段。
        required: true
        default: "1234"
        type: string
      root_password_mode:
        description: root 密码模式；locked=锁定 root，set=使用下方 ROOT_PASSWORD，empty=清空 root 密码。
        required: true
        default: locked
        type: choice
        options:
          - locked
          - set
          - empty
      root_password:
        description: root 密码；只有 ROOT_PASSWORD_MODE=set 时使用，locked/empty 时留空即可。
        required: false
        default: ""
        type: string
      user_sudo_mode:
        description: 默认用户 sudo 权限；password=需要密码，nopasswd=免密 sudo，none=不给 sudo。
        required: true
        default: password
        type: choice
        options:
          - password
          - nopasswd
          - none
      sddm_autologin:
        description: 是否启用 SDDM 自动登录；关闭时启动到登录界面，可切换用户。
        required: true
        default: false
        type: boolean
      boot_image_size:
        description: GRUB/FAT 启动镜像大小；可手填如 256M、512M、1G，使用现有 verified boot template 时默认 256M 足够。
        required: true
        default: 256M
        type: string
      rootfs_config:
        description: 高级 rootfs 配置，按 KEY=value 每行填写；常用选项已单独列出，并会覆盖这里的同名 KEY。
        required: true
        type: string
        default: |
          DISTRO=resolute
          ARCH=arm64
          ROOTFS_UUID=
          SDDM_AUTOLOGIN_SESSION=plasma
          TZ_REGION=Asia/Shanghai
          LANG_NAME=zh_CN.UTF-8
          PACKAGE_LIST=
          DESKTOP_ENV=kubuntu-desktop
          OVERLAY_ARCHIVE=
          DEB_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-device-debs-20260624-201420-compat1.tar.gz
          BUILD_Y700_SENSOR_DEBS=1
          SENSOR_DEB_ARCHIVE=https://github.com/GUF296/tb321fu-sensor-debs/releases/download/tb321fu-sensor-debs-20260626.1/tb321fu-sensor-debs_20260626.1_arm64.tar.gz
          SENSOR_SOURCE_ARCHIVE=
          SENSOR_BASELINE_OVERLAY_ARCHIVE=
          SENSOR_DEB_VERSION=20260626.1
          SENSOR_STRIP=1
          BUILD_TB321FU_HAPTICS_DEB=1
          HAPTICS_DEB_ARCHIVE=https://github.com/GUF296/tb321fu-haptics-debs/releases/download/tb321fu-haptics-debs-20260627.1/tb321fu-haptics-debs_20260627.1_arm64.tar.gz
          HAPTICS_SOURCE_ARCHIVE=
          KERNEL_SOURCE_ARCHIVE=
          KERNEL_BUILD_ARCHIVE=
          HAPTICS_DEB_VERSION=20260627.1
          HAPTICS_STRIP=1
          BUILD_TB321FU_CAMERA_STACK=1
          CAMERA_STACK_ARCHIVE=
          CAMERA_STACK_DIR=
          CAMERA_STACK_DEB_VERSION=20260627.4
          BUILD_TB321FU_GPU_SENSOR=1
          TB321FU_GPU_SENSOR_SOURCE_DIR=
          TB321FU_GPU_SENSOR_BUILD_JOBS=2
          INSTALL_GNOME_SNAPSHOT=1
          INSTALL_FIREFOX=1
          DISABLE_SNAPD=1
          APPLY_Y700_FIRMWARE_FIXES=1
          APPLY_Y700_AUDIO_POLICY_FIXES=1
          CLEAN_APT_CACHE=1
          COMPRESS=7z
          CHUNK_SIZE=
          KEEP_RAW_IMAGE=0
      boot_config:
        description: 高级 GRUB/FAT 启动镜像配置，按 KEY=value 每行填写；常用选项已单独列出，并会覆盖这里的同名 KEY。
        required: true
        type: string
        default: |
          BOOT_TEMPLATE_IMAGE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-verified-grub-template-userdata-20260624-201420.img
          BOOT_FAT_BITS=32
          BOOT_FAT_LABEL=Y700GRUB
          BOOT_SECTOR_SIZE=512
          BOOT_CLUSTER_SECTORS=
          ROOT_SELECTOR=partlabel
          ROOT_UUID=
          ROOTARGS=
          ROOTARGS_EXTRA=
          STABLEARGS=drm_client_lib.active=none
          BOOT_COMPRESS=7z
          BOOT_CHUNK_SIZE=
          KEEP_BOOT_IMAGE=0
      source_config:
        description: 高级源码/启动组件输入，按 KEY=value 每行填写；通常无需修改。
        required: true
        type: string
        default: |
          KERNEL_ARTIFACT_ARCHIVE=https://github.com/GUF296/ubuntu-y700-build-ci/releases/download/bootstrap-y700-20260625/y700-kernel-artifacts-7.1.1-g5df8e852ea72.tar.gz
          BOOTAA64_EFI_URL=
          QCOMRAMP_EFI_URL=
          QCOMRAMP_CFG_NAME=qcomramp.cfg
          GRUB_BUILD_ARCHIVE=
          DTB_NAME=sm8650-lenovo-tb321fu.dtb

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap dosfstools mtools e2fsprogs rsync curl unzip tar xz-utils zstd p7zip-full \
            gdisk qemu-utils sudo ca-certificates gnupg binutils \
            meson ninja-build pkg-config protobuf-c-compiler gcc-aarch64-linux-gnu \
            libglib2.0-dev:arm64 libqmi-glib-dev:arm64 libgudev-1.0-dev:arm64 libpolkit-gobject-1-dev:arm64 libprotobuf-c-dev:arm64

      - name: Apply workflow configuration
        env:
          INPUT_UBUNTU_MIRROR: ${{ inputs.ubuntu_mirror }}
          INPUT_DEBOOTSTRAP_VARIANT: ${{ inputs.debootstrap_variant }}
          INPUT_ROOTFS_IMAGE_SIZE: ${{ inputs.rootfs_image_size }}
          INPUT_ROOTFS_LABEL: ${{ inputs.rootfs_label }}
          INPUT_ROOTFS_PARTLABEL: ${{ inputs.rootfs_partlabel }}
          INPUT_HOSTNAME_NAME: ${{ inputs.hostname_name }}
          INPUT_DEFAULT_USER_NAME: ${{ inputs.default_user_name }}
          INPUT_DEFAULT_USER_PASSWORD: ${{ inputs.default_user_password }}
          INPUT_ROOT_PASSWORD_MODE: ${{ inputs.root_password_mode }}
          INPUT_ROOT_PASSWORD: ${{ inputs.root_password }}
          INPUT_USER_SUDO_MODE: ${{ inputs.user_sudo_mode }}
          INPUT_SDDM_AUTOLOGIN: ${{ inputs.sddm_autologin }}
          INPUT_BOOT_IMAGE_SIZE: ${{ inputs.boot_image_size }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/rootfs.env" <<'CONFIG_EOF'
          ${{ inputs.rootfs_config }}
          CONFIG_EOF
          cat > "$RUNNER_TEMP/boot.env" <<'CONFIG_EOF'
          ${{ inputs.boot_config }}
          CONFIG_EOF
          cat > "$RUNNER_TEMP/source.env" <<'CONFIG_EOF'
          ${{ inputs.source_config }}
          CONFIG_EOF
          sed -i 's/^          //' "$RUNNER_TEMP/rootfs.env" "$RUNNER_TEMP/boot.env" "$RUNNER_TEMP/source.env"
          {
            printf 'MIRROR=%s\n' "$INPUT_UBUNTU_MIRROR"
            if [ "$INPUT_DEBOOTSTRAP_VARIANT" = default ]; then
              printf 'DEBOOTSTRAP_VARIANT=\n'
            else
              printf 'DEBOOTSTRAP_VARIANT=%s\n' "$INPUT_DEBOOTSTRAP_VARIANT"
            fi
            printf 'ROOTFS_IMAGE_SIZE=%s\n' "$INPUT_ROOTFS_IMAGE_SIZE"
            printf 'ROOTFS_LABEL=%s\n' "$INPUT_ROOTFS_LABEL"
            printf 'ROOTFS_PARTLABEL=%s\n' "$INPUT_ROOTFS_PARTLABEL"
            printf 'HOSTNAME_NAME=%s\n' "$INPUT_HOSTNAME_NAME"
            printf 'DEFAULT_USER_NAME=%s\n' "$INPUT_DEFAULT_USER_NAME"
            printf 'DEFAULT_USER_PASSWORD=%s\n' "$INPUT_DEFAULT_USER_PASSWORD"
            printf 'ROOT_PASSWORD_MODE=%s\n' "$INPUT_ROOT_PASSWORD_MODE"
            printf 'ROOT_PASSWORD=%s\n' "$INPUT_ROOT_PASSWORD"
            printf 'USER_SUDO_MODE=%s\n' "$INPUT_USER_SUDO_MODE"
            if [ "$INPUT_SDDM_AUTOLOGIN" = true ]; then
              printf 'SDDM_AUTOLOGIN=1\n'
            else
              printf 'SDDM_AUTOLOGIN=0\n'
            fi
          } >> "$RUNNER_TEMP/rootfs.env"
          {
            printf 'BOOT_IMAGE_SIZE=%s\n' "$INPUT_BOOT_IMAGE_SIZE"
            printf 'ROOT_PARTLABEL=%s\n' "$INPUT_ROOTFS_PARTLABEL"
          } >> "$RUNNER_TEMP/boot.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/rootfs.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/boot.env"
          scripts/ci/apply-workflow-config.sh "$RUNNER_TEMP/source.env"
          {
            echo 'OUTPUT_DIR_ROOTFS=out/ci-rootfs'
            echo 'OUTPUT_DIR_GRUB=out/ci-grub'
            echo 'OUTPUT_PREFIX<<EOF_OUTPUT_PREFIX'
            echo '${{ inputs.output_prefix }}'
            echo 'EOF_OUTPUT_PREFIX'
          } >> "$GITHUB_ENV"

      - name: Prepare GRUB build input
        run: |
          set -euo pipefail
          if [ -n "${GRUB_BUILD_ARCHIVE:-}" ]; then
            mkdir -p "$RUNNER_TEMP/grub-build"
            curl -fL --retry 3 -o "$RUNNER_TEMP/grub-build.tar" "$GRUB_BUILD_ARCHIVE"
            if ! tar -C "$RUNNER_TEMP/grub-build" -xf "$RUNNER_TEMP/grub-build.tar"; then
              tar -C "$RUNNER_TEMP/grub-build" -xzf "$RUNNER_TEMP/grub-build.tar"
            fi
            found=$(find "$RUNNER_TEMP/grub-build" -type f -name grub-mkstandalone -perm -111 | head -n1)
            test -n "$found"
            echo "Y700_GRUB_BUILD_DIR=$(dirname "$found")" >> "$GITHUB_ENV"
          elif [ -n "${QCOMRAMP_EFI_URL:-}" ]; then
            echo 'Y700_GRUB_BUILD_DIR=' >> "$GITHUB_ENV"
            echo 'Using prebuilt QCOMRAMP_EFI_URL; skipping grub-mkstandalone input.'
          elif [ -n "${BOOT_TEMPLATE_IMAGE:-}" ] || [ -n "${BOOT_TEMPLATE_IMAGE_URL:-}" ]; then
            echo 'Y700_GRUB_BUILD_DIR=' >> "$GITHUB_ENV"
            echo 'Using BOOT_TEMPLATE_IMAGE; preserving verified GRUB/EFI template.'
          else
            echo 'Either GRUB_BUILD_ARCHIVE, QCOMRAMP_EFI_URL, or BOOT_TEMPLATE_IMAGE must be set.' >&2
            exit 1
          fi

      - name: Build source sensor debs
        run: |
          set -euo pipefail
          if [ "${BUILD_Y700_SENSOR_DEBS:-0}" != "1" ]; then
            echo 'BUILD_Y700_SENSOR_DEBS is not 1; skipping.'
            echo 'Y700_SENSOR_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${SENSOR_SOURCE_ARCHIVE:-}" ] && [ -z "${SENSOR_SOURCE_DIR:-}" ]; then
            if [ -n "${SENSOR_DEB_ARCHIVE:-}" ] || [ -n "${SENSOR_DEB_DIR:-}" ]; then
              echo 'Prebuilt sensor deb input provided; skipping source sensor deb build.'
              echo 'Y700_SENSOR_DEB_DIR=' >> "$GITHUB_ENV"
              exit 0
            fi
            echo 'BUILD_Y700_SENSOR_DEBS=1 requires SENSOR_SOURCE_ARCHIVE/SENSOR_SOURCE_DIR plus SENSOR_BASELINE_OVERLAY_ARCHIVE/SENSOR_BASELINE_OVERLAY_DIR, or provide SENSOR_DEB_ARCHIVE/SENSOR_DEB_DIR, or set BUILD_Y700_SENSOR_DEBS=0.' >&2
            exit 1
          fi
          if [ -z "${SENSOR_BASELINE_OVERLAY_ARCHIVE:-}" ] && [ -z "${SENSOR_BASELINE_OVERLAY_DIR:-}" ]; then
            if [ -n "${SENSOR_DEB_ARCHIVE:-}" ] || [ -n "${SENSOR_DEB_DIR:-}" ]; then
              echo 'Prebuilt sensor deb input provided; skipping source sensor deb build.'
              echo 'Y700_SENSOR_DEB_DIR=' >> "$GITHUB_ENV"
              exit 0
            fi
            echo 'BUILD_Y700_SENSOR_DEBS=1 requires SENSOR_BASELINE_OVERLAY_ARCHIVE/SENSOR_BASELINE_OVERLAY_DIR, or provide SENSOR_DEB_ARCHIVE/SENSOR_DEB_DIR, or set BUILD_Y700_SENSOR_DEBS=0.' >&2
            exit 1
          fi
          env OUTPUT_DIR="out/y700-sensor-debs" \
            ARCH="${ARCH:-arm64}" \
            SENSOR_DEB_VERSION="${SENSOR_DEB_VERSION:-20260626.1}" \
            SENSOR_SOURCE_ARCHIVE="${SENSOR_SOURCE_ARCHIVE:-}" \
            SENSOR_SOURCE_DIR="${SENSOR_SOURCE_DIR:-}" \
            SENSOR_BASELINE_OVERLAY_ARCHIVE="${SENSOR_BASELINE_OVERLAY_ARCHIVE:-}" \
            SENSOR_BASELINE_OVERLAY_DIR="${SENSOR_BASELINE_OVERLAY_DIR:-}" \
            SENSOR_STRIP="${SENSOR_STRIP:-1}" \
            bash scripts/ci/build-y700-sensor-debs.sh
          echo 'Y700_SENSOR_DEB_DIR=out/y700-sensor-debs' >> "$GITHUB_ENV"

      - name: Build source haptics deb
        run: |
          set -euo pipefail
          if [ "${BUILD_TB321FU_HAPTICS_DEB:-0}" != "1" ]; then
            echo 'BUILD_TB321FU_HAPTICS_DEB is not 1; skipping.'
            echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${HAPTICS_SOURCE_ARCHIVE:-}" ] && [ -z "${HAPTICS_SOURCE_DIR:-}" ]; then
            if [ -n "${HAPTICS_DEB_ARCHIVE:-}" ] || [ -n "${HAPTICS_DEB_DIR:-}" ]; then
              echo 'Prebuilt haptics deb input provided; skipping source haptics deb build.'
              echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
              exit 0
            fi
            echo 'BUILD_TB321FU_HAPTICS_DEB=1 requires HAPTICS_SOURCE_ARCHIVE/HAPTICS_SOURCE_DIR plus KERNEL_SOURCE_ARCHIVE/KERNEL_SOURCE_DIR and KERNEL_BUILD_ARCHIVE/KERNEL_BUILD_DIR, or provide HAPTICS_DEB_ARCHIVE/HAPTICS_DEB_DIR, or set BUILD_TB321FU_HAPTICS_DEB=0.' >&2
            exit 1
          fi
          if [ -z "${KERNEL_SOURCE_ARCHIVE:-}" ] && [ -z "${KERNEL_SOURCE_DIR:-}" ]; then
            if [ -n "${HAPTICS_DEB_ARCHIVE:-}" ] || [ -n "${HAPTICS_DEB_DIR:-}" ]; then
              echo 'Prebuilt haptics deb input provided; skipping source haptics deb build.'
              echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
              exit 0
            fi
            echo 'BUILD_TB321FU_HAPTICS_DEB=1 requires KERNEL_SOURCE_ARCHIVE/KERNEL_SOURCE_DIR, or provide HAPTICS_DEB_ARCHIVE/HAPTICS_DEB_DIR, or set BUILD_TB321FU_HAPTICS_DEB=0.' >&2
            exit 1
          fi
          if [ -z "${KERNEL_BUILD_ARCHIVE:-}" ] && [ -z "${KERNEL_BUILD_DIR:-}" ]; then
            if [ -n "${HAPTICS_DEB_ARCHIVE:-}" ] || [ -n "${HAPTICS_DEB_DIR:-}" ]; then
              echo 'Prebuilt haptics deb input provided; skipping source haptics deb build.'
              echo 'TB321FU_HAPTICS_DEB_DIR=' >> "$GITHUB_ENV"
              exit 0
            fi
            echo 'BUILD_TB321FU_HAPTICS_DEB=1 requires KERNEL_BUILD_ARCHIVE/KERNEL_BUILD_DIR, or provide HAPTICS_DEB_ARCHIVE/HAPTICS_DEB_DIR, or set BUILD_TB321FU_HAPTICS_DEB=0.' >&2
            exit 1
          fi
          env OUTPUT_DIR="out/tb321fu-haptics-debs" \
            ARCH="${ARCH:-arm64}" \
            HAPTICS_DEB_VERSION="${HAPTICS_DEB_VERSION:-20260627.1}" \
            HAPTICS_SOURCE_ARCHIVE="${HAPTICS_SOURCE_ARCHIVE:-}" \
            HAPTICS_SOURCE_DIR="${HAPTICS_SOURCE_DIR:-}" \
            KERNEL_SOURCE_ARCHIVE="${KERNEL_SOURCE_ARCHIVE:-}" \
            KERNEL_SOURCE_DIR="${KERNEL_SOURCE_DIR:-}" \
            KERNEL_BUILD_ARCHIVE="${KERNEL_BUILD_ARCHIVE:-}" \
            KERNEL_BUILD_DIR="${KERNEL_BUILD_DIR:-}" \
            HAPTICS_STRIP="${HAPTICS_STRIP:-1}" \
            bash scripts/ci/build-tb321fu-haptics-deb.sh
          echo 'TB321FU_HAPTICS_DEB_DIR=out/tb321fu-haptics-debs' >> "$GITHUB_ENV"

      - name: Build verified camera stack deb
        run: |
          set -euo pipefail
          if [ "${BUILD_TB321FU_CAMERA_STACK:-0}" != "1" ]; then
            echo 'BUILD_TB321FU_CAMERA_STACK is not 1; skipping.'
            echo 'TB321FU_CAMERA_STACK_DEB_DIR=' >> "$GITHUB_ENV"
            exit 0
          fi
          env OUTPUT_DIR="out/tb321fu-camera-stack-debs" \
            ARCH="${ARCH:-arm64}" \
            CAMERA_STACK_DEB_VERSION="${CAMERA_STACK_DEB_VERSION:-20260627.4}" \
            CAMERA_STACK_ARCHIVE="${CAMERA_STACK_ARCHIVE:-}" \
            CAMERA_STACK_DIR="${CAMERA_STACK_DIR:-}" \
            bash scripts/ci/build-tb321fu-camera-stack-deb.sh
          echo 'TB321FU_CAMERA_STACK_DEB_DIR=out/tb321fu-camera-stack-debs' >> "$GITHUB_ENV"

      - name: Build rootfs image
        run: |
          set -euo pipefail
          sudo --preserve-env=OUTPUT_PREFIX,DISTRO,ARCH,MIRROR,DEBOOTSTRAP_VARIANT,RESOLV_CONF_CONTENT,APT_HTTP_PROXY,APT_HTTPS_PROXY,http_proxy,https_proxy,HTTP_PROXY,HTTPS_PROXY,APT_SOURCES_LIST,ROOTFS_IMAGE_SIZE,ROOTFS_UUID,ROOTFS_LABEL,ROOTFS_PARTLABEL,HOSTNAME_NAME,DEFAULT_USER_NAME,DEFAULT_USER_PASSWORD,ROOT_PASSWORD_MODE,ROOT_PASSWORD,USER_SUDO_MODE,SDDM_AUTOLOGIN,SDDM_AUTOLOGIN_SESSION,TZ_REGION,LOCALES,LANG_NAME,PACKAGE_LIST,DESKTOP_ENV,OVERLAY_ARCHIVE,DEB_ARCHIVE,DEB_DIR,SENSOR_DEB_ARCHIVE,SENSOR_DEB_DIR,HAPTICS_DEB_ARCHIVE,HAPTICS_DEB_DIR,CAMERA_STACK_DEB_DIR,BUILD_TB321FU_GPU_SENSOR,TB321FU_GPU_SENSOR_SOURCE_DIR,TB321FU_GPU_SENSOR_BUILD_JOBS,INSTALL_GNOME_SNAPSHOT,INSTALL_FIREFOX,DISABLE_SNAPD,APPLY_Y700_FIRMWARE_FIXES,APPLY_Y700_AUDIO_POLICY_FIXES,CLEAN_APT_CACHE,COMPRESS,CHUNK_SIZE,KEEP_RAW_IMAGE \
            env OUTPUT_DIR="$OUTPUT_DIR_ROOTFS" SENSOR_DEB_DIR="${Y700_SENSOR_DEB_DIR:-${SENSOR_DEB_DIR:-}}" HAPTICS_DEB_DIR="${TB321FU_HAPTICS_DEB_DIR:-${HAPTICS_DEB_DIR:-}}" CAMERA_STACK_DEB_DIR="${TB321FU_CAMERA_STACK_DEB_DIR:-}" bash scripts/ci/build-rootfs-image.sh
          sudo chown -R "$USER:$USER" out

      - name: Build GRUB boot image
        run: |
          set -euo pipefail
          env OUTPUT_DIR="$OUTPUT_DIR_GRUB" \
            OUTPUT_PREFIX="$OUTPUT_PREFIX" \
            BOOT_TEMPLATE_IMAGE="${BOOT_TEMPLATE_IMAGE:-}" \
            BOOT_TEMPLATE_IMAGE_URL="${BOOT_TEMPLATE_IMAGE_URL:-}" \
            BOOT_IMAGE_SIZE="$BOOT_IMAGE_SIZE" \
            BOOT_FAT_BITS="$BOOT_FAT_BITS" \
            BOOT_FAT_LABEL="$BOOT_FAT_LABEL" \
            BOOT_SECTOR_SIZE="$BOOT_SECTOR_SIZE" \
            BOOT_CLUSTER_SECTORS="$BOOT_CLUSTER_SECTORS" \
            KERNEL_ARTIFACT_ARCHIVE="$KERNEL_ARTIFACT_ARCHIVE" \
            BOOTAA64_EFI_URL="$BOOTAA64_EFI_URL" \
            QCOMRAMP_EFI_URL="$QCOMRAMP_EFI_URL" \
            QCOMRAMP_CFG_NAME="$QCOMRAMP_CFG_NAME" \
            DTB_NAME="$DTB_NAME" \
            ROOT_SELECTOR="$ROOT_SELECTOR" \
            ROOT_PARTLABEL="$ROOT_PARTLABEL" \
            ROOT_UUID="$ROOT_UUID" \
            ROOTARGS="$ROOTARGS" \
            ROOTARGS_EXTRA="$ROOTARGS_EXTRA" \
            STABLEARGS="$STABLEARGS" \
            BOOT_COMPRESS="$BOOT_COMPRESS" \
            BOOT_CHUNK_SIZE="$BOOT_CHUNK_SIZE" \
            KEEP_BOOT_IMAGE="$KEEP_BOOT_IMAGE" \
            Y700_GRUB_BUILD_DIR="$Y700_GRUB_BUILD_DIR" \
            bash scripts/ci/build-grub-image.sh

      - name: Write combined checksums
        run: |
          set -euo pipefail
          mkdir -p out/ci-release
          checksum_dirs=("$OUTPUT_DIR_ROOTFS" "$OUTPUT_DIR_GRUB")
          if [ -d out/y700-sensor-debs ]; then
            checksum_dirs+=(out/y700-sensor-debs)
          fi
          if [ -d out/tb321fu-haptics-debs ]; then
            checksum_dirs+=(out/tb321fu-haptics-debs)
          fi
          if [ -d out/tb321fu-camera-stack-debs ]; then
            checksum_dirs+=(out/tb321fu-camera-stack-debs)
          fi
          find "${checksum_dirs[@]}" -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > out/ci-release/SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_prefix }}-rootfs-grub
          path: |
            out/ci-rootfs/*
            out/ci-grub/*
            out/y700-sensor-debs/*
            out/tb321fu-haptics-debs/*
            out/tb321fu-camera-stack-debs/*
            out/ci-release/SHA256SUMS.txt

      - name: Upload release assets
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          release_dir=out/ci-release/assets
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          select_release_asset() {
            local source_dir=$1
            local source_prefix=$2
            local release_kind=$3
            local compress=$4
            local chunk_size=$5
            local suffix src dest

            case "$compress" in
              none) suffix=.img; src="$source_dir/$source_prefix" ;;
              zstd) suffix=.img.zst; src="$source_dir/$source_prefix.zst" ;;
              xz) suffix=.img.xz; src="$source_dir/$source_prefix.xz" ;;
              7z)
                if [ -n "$chunk_size" ]; then
                  echo "Release upload expects a single $release_kind archive; clear CHUNK_SIZE/BOOT_CHUNK_SIZE instead of using 7z volumes." >&2
                  exit 1
                fi
                suffix=.img.7z
                src="$source_dir/$source_prefix.7z"
                ;;
              *) echo "unsupported $release_kind compression: $compress" >&2; exit 1 ;;
            esac

            [ -f "$src" ] || { echo "missing release $release_kind asset: $src" >&2; exit 1; }
            dest="$release_dir/${OUTPUT_PREFIX}-${release_kind}${suffix}"
            cp -a "$src" "$dest"
          }

          select_release_asset "$OUTPUT_DIR_ROOTFS" "${OUTPUT_PREFIX}-rootfs.img" rootfs "${COMPRESS:-7z}" "${CHUNK_SIZE:-}"
          select_release_asset "$OUTPUT_DIR_GRUB" "${OUTPUT_PREFIX}-grub-fat.img" grub "${BOOT_COMPRESS:-7z}" "${BOOT_CHUNK_SIZE:-}"
          (cd "$release_dir" && sha256sum * > SHA256SUMS.txt)

          notes=out/ci-release/BUILD-PARAMETERS.md
          rootfs_notes=out/ci-release/rootfs-config-for-notes.txt
          boot_notes=out/ci-release/boot-config-for-notes.txt
          source_notes=out/ci-release/source-config-for-notes.txt
          cat > "$rootfs_notes" <<'CONFIG_EOF'
          ${{ inputs.rootfs_config }}
          CONFIG_EOF
          cat > "$boot_notes" <<'CONFIG_EOF'
          ${{ inputs.boot_config }}
          CONFIG_EOF
          cat > "$source_notes" <<'CONFIG_EOF'
          ${{ inputs.source_config }}
          CONFIG_EOF
          sed -i 's/^          //' "$rootfs_notes" "$boot_notes" "$source_notes"
          {
            echo '# Build Parameters'
            echo
            echo "- Output prefix: \`$OUTPUT_PREFIX\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Workflow run: \`$GITHUB_RUN_ID\`"
            echo "- Generated: \`$(date -u -Iseconds)\`"
            echo
            echo 'Password-like values are redacted in these release notes.'
            echo
            echo '## rootfs_config'
            echo '```text'
            sed -E 's/^((DEFAULT_USER_PASSWORD|ROOT_PASSWORD)=).*/\1<redacted>/' "$rootfs_notes"
            echo '```'
            echo
            echo '## boot_config'
            echo '```text'
            cat "$boot_notes"
            echo '```'
            echo
            echo '## source_config'
            echo '```text'
            cat "$source_notes"
            echo '```'
          } > "$notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$notes"
            while IFS= read -r asset_name; do
              [ -n "$asset_name" ] || continue
              gh release delete-asset "$RELEASE_TAG" "$asset_name" -y || true
            done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
          else
            gh release create "$RELEASE_TAG" --prerelease --title "$RELEASE_TAG" --notes-file "$notes"
          fi

          gh release upload "$RELEASE_TAG" "$release_dir"/* --clobber
